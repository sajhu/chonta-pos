databases:
  - name: chonta-pos-db
    plan: free
    databaseName: chonta_pos
    user: chonta

services:
  - type: web
    name: chonta-pos
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run migrate:deploy -w apps/server
    startCommand: npm run start -w apps/server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chonta-pos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
